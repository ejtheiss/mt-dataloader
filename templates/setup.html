{% extends "base.html" %}
{% block nav_setup %}active{% endblock %}
{% block title %}Setup — MT Dataloader{% endblock %}

{% block content %}
<div class="setup-container">
    <h2>Configure Dataloader</h2>
    <p class="subtitle">
        Connect to your <a href="{{ mt_docs.sandbox }}" target="_blank" rel="noopener" class="doc-link-inline">Modern Treasury sandbox</a>
        and provide a JSON config.
    </p>

    <form id="setup-form"
          hx-post="/api/validate"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-indicator="#validate-spinner"
          hx-disabled-elt="button[type=submit]"
          enctype="multipart/form-data">

        <div class="form-row">
            <div class="form-group">
                <label for="api_key">API Key</label>
                <input type="password" id="api_key" name="api_key" required
                       placeholder="sk_test_..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="org_id">Organization ID</label>
                <input type="text" id="org_id" name="org_id" required
                       placeholder="org_..." autocomplete="off">
            </div>
        </div>

        <div class="form-group">
            <label>JSON Config</label>
            <div class="input-tabs">
                <button type="button" class="input-tab active" data-target="tab-file">Upload File</button>
                <button type="button" class="input-tab" data-target="tab-paste">Paste JSON</button>
            </div>

            <div id="tab-file" class="input-tab-panel active">
                <div class="file-drop-zone" id="drop-zone">
                    <input type="file" id="config_file" name="config_file"
                           accept=".json,application/json">
                    <div class="file-drop-label">
                        <strong>Choose a file</strong> or drag it here
                    </div>
                    <div class="file-drop-filename" id="file-name"></div>
                </div>
            </div>

            <div id="tab-paste" class="input-tab-panel">
                <textarea id="config_json" name="config_json"
                          class="json-editor" rows="18"
                          placeholder='Paste your JSON config here...'
                          spellcheck="false"></textarea>
                <div id="json-parse-status" class="json-parse-status"></div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <span class="btn-text">Validate &amp; Preview</span>
                <span id="validate-spinner" class="htmx-indicator spinner"></span>
            </button>
        </div>
    </form>
</div>

<script>
(function() {
    // Tab switching
    var tabs = document.querySelectorAll(".input-tab");
    var panels = document.querySelectorAll(".input-tab-panel");
    tabs.forEach(function(tab) {
        tab.addEventListener("click", function() {
            tabs.forEach(function(t) { t.classList.remove("active"); });
            panels.forEach(function(p) { p.classList.remove("active"); });
            tab.classList.add("active");
            document.getElementById(tab.dataset.target).classList.add("active");
        });
    });

    // File drop zone
    var zone = document.getElementById("drop-zone");
    var input = document.getElementById("config_file");
    var label = document.getElementById("file-name");
    zone.addEventListener("dragover", function(e) {
        e.preventDefault(); zone.classList.add("dragover");
    });
    zone.addEventListener("dragleave", function() {
        zone.classList.remove("dragover");
    });
    zone.addEventListener("drop", function(e) {
        e.preventDefault(); zone.classList.remove("dragover");
        if (e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            showFile(e.dataTransfer.files[0].name);
        }
    });
    input.addEventListener("change", function() {
        if (input.files.length) showFile(input.files[0].name);
    });
    function showFile(name) {
        label.textContent = name;
        label.classList.add("visible");
    }

    // Live JSON parse validation
    var editor = document.getElementById("config_json");
    var status = document.getElementById("json-parse-status");
    var debounce;
    editor.addEventListener("input", function() {
        clearTimeout(debounce);
        debounce = setTimeout(function() {
            var val = editor.value.trim();
            if (!val) { status.textContent = ""; status.className = "json-parse-status"; return; }
            try {
                var obj = JSON.parse(val);
                var keys = Object.keys(obj);
                status.textContent = "Valid JSON — " + keys.length + " top-level key(s)";
                status.className = "json-parse-status valid";
            } catch(e) {
                status.textContent = e.message;
                status.className = "json-parse-status invalid";
            }
        }, 300);
    });

    // Prevent submit if no config provided
    document.getElementById("setup-form").addEventListener("htmx:configRequest", function(evt) {
        var activeTab = document.querySelector(".input-tab.active");
        if (activeTab && activeTab.dataset.target === "tab-paste") {
            if (!editor.value.trim()) {
                evt.preventDefault();
                status.textContent = "Paste a JSON config before submitting.";
                status.className = "json-parse-status invalid";
            }
        } else {
            if (!input.files || !input.files.length) {
                evt.preventDefault();
                label.textContent = "Please select a file.";
                label.classList.add("visible");
                label.style.color = "var(--status-error)";
            }
        }
    });
})();
</script>
{% endblock %}
