<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MT Dataloader{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v={{ css_version }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script>
    document.addEventListener("htmx:beforeSwap", function(evt) {
        var code = evt.detail.xhr.status;
        if (code >= 400 && code < 600) {
            evt.detail.shouldSwap = true;
            evt.detail.isError = false;
        }
    });

    /* --- Credential persistence via sessionStorage --- */
    var _creds = {
        save: function() {
            var k = document.querySelector('[name="api_key"]');
            var o = document.querySelector('[name="org_id"]');
            var n = document.querySelector('[name="org_name"]');
            if (k && k.value) sessionStorage.setItem("mt_api_key", k.value);
            if (o && o.value) sessionStorage.setItem("mt_org_id", o.value);
            if (n && n.value) sessionStorage.setItem("mt_org_name", n.value);
        },
        restore: function() {
            var key = sessionStorage.getItem("mt_api_key");
            var org = sessionStorage.getItem("mt_org_id");
            var name = sessionStorage.getItem("mt_org_name");
            document.querySelectorAll('[name="api_key"]').forEach(function(el) {
                if (!el.value && key) el.value = key;
            });
            document.querySelectorAll('[name="org_id"]').forEach(function(el) {
                if (!el.value && org) el.value = org;
            });
            document.querySelectorAll('[name="org_name"]').forEach(function(el) {
                if (!el.value && name) el.value = name;
            });
        }
    };
    document.addEventListener("DOMContentLoaded", _creds.restore);
    document.addEventListener("htmx:afterSettle", _creds.restore);
    document.addEventListener("htmx:configRequest", function() { _creds.save(); });
    </script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="application-sidebar">
            <a href="/setup" class="sidebar-logo">
                <img src="/static/mt-symbol.svg" alt="MT" width="20" height="20">
                <span>Dataloader</span>
            </a>
            <div class="sidebar-org" id="sidebar-org"></div>
            <nav class="sidebar-nav">
                <a href="/setup" class="sidebar-link {% block nav_setup %}{% endblock %}">Setup</a>
                <a href="/flows" class="sidebar-link {% block nav_flows %}{% endblock %}">Fund Flows</a>
                <a href="/runs" class="sidebar-link {% block nav_runs %}{% endblock %}">Runs</a>
                <a href="/listen" class="sidebar-link {% block nav_listen %}{% endblock %}">Listener</a>
            </nav>
            <div class="sidebar-connection" id="sidebar-connection">
                <div class="conn-status">
                    <span class="conn-org" id="conn-org-label"></span>
                </div>
                <button class="btn btn-xs btn-outline conn-edit-btn"
                        hx-get="/api/connection-editor"
                        hx-target="#conn-editor-modal"
                        hx-swap="innerHTML"
                        hx-on:htmx:after-settle="document.getElementById('conn-editor-modal').style.display='block'"
                        style="display:none;" id="conn-edit-btn">Change</button>
            </div>
            <div id="conn-editor-modal" style="display:none;"></div>
            <div class="sidebar-footer">
                <span class="cred-status" id="cred-status"></span>
            </div>
        </aside>
        <main id="content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
    (function() {
        var orgEl = document.getElementById("sidebar-org");
        var credEl = document.getElementById("cred-status");
        var orgName = sessionStorage.getItem("mt_org_name");
        var orgId = sessionStorage.getItem("mt_org_id");
        if (orgName || orgId) {
            orgEl.innerHTML =
                '<div class="org-name">' + (orgName || orgId) + '</div>' +
                (orgName && orgId ? '<div class="org-id">' + orgId + '</div>' : '');
        }
        if (orgId) {
            credEl.textContent = orgId;
            credEl.title = "Org ID stored for this session";
        }
        var connOrg = document.getElementById("conn-org-label");
        var connBtn = document.getElementById("conn-edit-btn");
        if (orgName || orgId) {
            connOrg.textContent = orgName || orgId;
            connBtn.style.display = "inline-block";
        }
        var token = new URLSearchParams(window.location.search).get('session_token');
        if (token) {
            var flowsLink = document.querySelector('a.sidebar-link[href="/flows"]');
            if (flowsLink) flowsLink.href = '/flows?session_token=' + token;
        }
    })();
    </script>
</body>
</html>
