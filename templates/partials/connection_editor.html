<div class="modal-overlay" id="conn-editor-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal-panel">
        <div class="modal-header">
            <div class="modal-heading">
                <div class="modal-title">Connection Settings</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-xs" onclick="document.getElementById('conn-editor-modal').style.display='none'" aria-label="Close">✕</button>
            </div>
        </div>
        <form id="conn-editor-form">
            <div class="modal-body">
                <div class="key-value-table">
                    <div class="key-value-table-row">
                        <div class="row-label"><label>API Key</label></div>
                        <div class="row-value">
                            <input type="password" name="api_key" class="mt-input"
                                   value="{{ api_key or '' }}" placeholder="Enter MT API key">
                        </div>
                    </div>
                    <div class="key-value-table-row">
                        <div class="row-label"><label>Organization ID</label></div>
                        <div class="row-value">
                            <input type="text" name="org_id" class="mt-input"
                                   value="{{ org_id or '' }}" placeholder="Enter org ID">
                        </div>
                    </div>
                    <div class="key-value-table-row">
                        <div class="row-label"><label>Org Name</label></div>
                        <div class="row-value">
                            <input type="text" name="org_name" class="mt-input"
                                   value="{{ org_name or '' }}" placeholder="Display name (optional)">
                        </div>
                    </div>
                </div>
                <div id="conn-test-result" style="margin-top: 12px;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline btn-sm"
                        hx-post="/api/connection-test"
                        hx-include="#conn-editor-form"
                        hx-target="#conn-test-result"
                        hx-swap="innerHTML">
                    Test Connection
                </button>
                <button type="button" class="btn btn-primary btn-sm"
                        hx-post="/api/connection-apply"
                        hx-include="#conn-editor-form"
                        hx-target="#conn-apply-result"
                        hx-swap="innerHTML"
                        onclick="_creds.save();">
                    Apply
                </button>
            </div>
            <div id="conn-apply-result" style="padding: 0 16px 12px;"></div>
        </form>
    </div>
</div>
