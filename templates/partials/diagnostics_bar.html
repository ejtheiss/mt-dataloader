{% if diagnostics %}
<div class="diagnostics-badges">
    <span class="badge badge--default">{{ diagnostics.total_steps }} Steps</span>
    {% for rtype, count in diagnostics.type_counts.items() %}
    <span class="badge badge--cool">{{ count }} {{ rtype }}</span>
    {% endfor %}
    <span class="badge badge--default">{{ diagnostics.total_entries }} Ledger Entries</span>
    <span class="badge badge--default">{{ diagnostics.trace_value_count }} Trace Values</span>
</div>
{% endif %}
