# CI phases: pytest + compileall now; Ruff / import-linter per plan/00_repo_organization.md §6.
name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff lint + format check
        run: |
          ruff check .
          ruff format --check .

      - name: Byte-compile Python (syntax / stale imports surface early)
        run: python -m compileall -q -x '^\./(\.git|\.venv|venv)/' .

      - name: Run tests
        run: python -m pytest tests/ -q
