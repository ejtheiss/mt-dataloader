# CI: Ruff + pytest + compileall; import-linter per plan/3.31.26 plans-data loader/00_repo_conventions.md §6.
name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Block tracked files under plan/
        run: |
          if git ls-files | grep -qE '^plan(/|$)'; then
            echo "The plan/ directory must not be tracked. Offending paths:" >&2
            git ls-files | grep -E '^plan(/|$)' >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin Ruff so `ruff format --check` matches local `ruff format` (upgrade deliberately).
          pip install pytest import-linter ruff==0.15.9

      - name: Alembic upgrade (fresh SQLite, Plan 0)
        env:
          DATALOADER_DATA_DIR: ${{ runner.temp }}/dataloader_ci_db
        run: |
          mkdir -p "$DATALOADER_DATA_DIR"
          alembic upgrade head

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

      - name: CSS literal guard (strict chrome files)
        run: python scripts/check_css_literals.py

      - name: Import linter (layer contracts)
        run: lint-imports

      - name: Byte-compile Python (syntax / stale imports surface early)
        run: python -m compileall -q -x '^\./(\.git|\.venv|venv)/' .

      - name: Run tests
        run: python -m pytest tests/ -q
